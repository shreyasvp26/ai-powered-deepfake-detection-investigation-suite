[pytest]
markers =
    gpu: needs CUDA / GPU and must not run in default CPU CI
    weights: needs local FaceForensics++ Xception weight files (e.g. full_c23.p) under models/
    integration_httpx: httpx ASGITransport multi-step job flow (V2A-10)
    rate_limited: POST /v1/jobs enforces 3/hour; run with real slowapi (V2A-07)
