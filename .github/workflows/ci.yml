name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: OpenAPI JSON matches app (V2A-09)
        run: |
          python scripts/export_openapi.py
          git diff --exit-code -- api/openapi.json

      - name: Pre-commit
        run: pre-commit run --all-files

      - name: Pytest (CPU, no local weights)
        run: pytest -q -m "not gpu and not weights"

  docker-compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Build stack and run smoke script
        run: |
          set -euo pipefail
          docker compose up --build -d
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:8000/v1/healthz/live" >/dev/null 2>&1; then
              echo "api healthy"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "api did not become healthy in time" >&2
              docker compose logs
              exit 1
            fi
            sleep 2
          done
          ./scripts/docker-smoke.sh
          docker compose down -v
